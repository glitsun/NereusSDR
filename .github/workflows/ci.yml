name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: macos-15
            name: macOS Apple Silicon
          - os: windows-latest
            name: Windows x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Compliance verification (Linux only)
      # ------------------------------------------------------------------
      - name: Verify Thetis license headers
        if: runner.os == 'Linux'
        run: python3 scripts/verify-thetis-headers.py

      - name: Check for un-attributed new ports (PR diff scan)
        # Reverse-attribution check: scans added/modified C/C++ files in
        # the PR diff for Thetis-style markers (callsigns, upstream
        # filenames, cls*/uc*/frm* class patterns) and fails if any look
        # like a port but aren't in PROVENANCE.md or marked as opt-out.
        # Closes the gap left by verify-thetis-headers.py, which only
        # checks files already registered in PROVENANCE.
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        env:
          CHECK_NEW_PORTS_BASE_REF: origin/${{ github.base_ref }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=100
          python3 scripts/check-new-ports.py

      - name: Check for un-attributed ports (full-tree sweep)
        # Complements the diff scan above by sweeping every src/**/*.{cpp,h}
        # against the union of THETIS-PROVENANCE, WDSP-PROVENANCE, and
        # aethersdr-reconciliation. Catches historical gap cases — files
        # that were committed before the diff heuristic existed and
        # slipped through without attribution. Extends the heuristic to
        # AetherSDR tells (KK7GWY, "Ported from AetherSDR" comments,
        # AetherSDR filenames adjacent to the "AetherSDR" marker).
        if: runner.os == 'Linux'
        env:
          CHECK_NEW_PORTS_FULL: "1"
        run: python3 scripts/check-new-ports.py

      # ------------------------------------------------------------------
      # Phase 2/3 compliance auditors (added 2026-04-18, Plan Task 15)
      # ------------------------------------------------------------------
      - name: Verify AetherSDR + WDSP license-header markers
        # Extends the Thetis-kind header check above to the two other
        # lineage kinds (AetherSDR Bucket A + WDSP vendored sources).
        # Fails if a Bucket A file is missing the project-level
        # AetherSDR attribution, or if a WDSP source lost its upstream
        # GPL permission block on re-import.
        if: runner.os == 'Linux'
        run: python3 scripts/verify-thetis-headers.py --all-kinds

      - name: Verify provenance tables match the source tree
        # Already enforced in pre-commit Ring 2. Re-run in CI Ring 3
        # because squashed merges and rebases can introduce drift the
        # hook never saw.
        if: runner.os == 'Linux'
        run: python3 scripts/verify-provenance-sync.py

      - name: Verify inline '// From Thetis' cite version stamps
        # Regression gate: fails if the count of unstamped cites
        # exceeds the grandfathered baseline in
        # tests/compliance/inline-cites-baseline.json (288 as of
        # 2026-04-18 sweep). --strict will replace this once the
        # baseline has been remediated to zero.
        if: runner.os == 'Linux'
        run: python3 scripts/verify-inline-cites.py

      - name: Compliance inventory — no missing required markers
        # Walks every git-tracked file, classifies by upstream lineage,
        # verifies per-kind header markers. Fails on any missing marker.
        if: runner.os == 'Linux'
        run: python3 scripts/compliance-inventory.py --fail-on-unclassified

      # ------------------------------------------------------------------
      # Inline author-tag preservation (added 2026-04-21 after DH1KLM drop)
      # ------------------------------------------------------------------
      - name: Clone Thetis + mi0bot-Thetis upstream for tag check
        if: runner.os == 'Linux'
        run: |
          git clone --depth=1 https://github.com/ramdor/Thetis.git ../Thetis
          git clone --depth=1 https://github.com/mi0bot/OpenHPSDR-Thetis.git ../mi0bot-Thetis

      - name: Corpus drift — upstream author tags match committed corpus
        # Fails if upstream Thetis (ramdor or mi0bot fork) contains
        # contributor tags that the committed
        # docs/attribution/thetis-author-tags.json does not yet list.
        # Forces corpus refresh before any port can cite a new region.
        if: runner.os == 'Linux'
        env:
          NEREUS_THETIS_DIR: ${{ github.workspace }}/../Thetis
          NEREUS_MI0BOT_DIR: ${{ github.workspace }}/../mi0bot-Thetis
        run: python3 scripts/discover-thetis-author-tags.py --drift

      - name: Verify inline author-tag preservation in ported code
        # For every `// From Thetis X:N [@sha]` cite, opens upstream at
        # line N and requires any author tag in ±5 source lines to
        # appear within ±10 port lines. This is the safety net that
        # would have caught the 2026-04-21 DH1KLM drop at PR time.
        if: runner.os == 'Linux'
        env:
          NEREUS_THETIS_DIR: ${{ github.workspace }}/../Thetis
          NEREUS_MI0BOT_DIR: ${{ github.workspace }}/../mi0bot-Thetis
        run: python3 scripts/verify-inline-tag-preservation.py

      - name: Contributor indexes are up to date with corpus
        # Regenerates docs/attribution/thetis-{contributor,inline-mods}-
        # index.md from the corpus JSON and fails the PR if the
        # committed indexes drift. Ensures the two human-readable
        # audit docs stay in lockstep with the mechanical corpus, and
        # by extension with upstream Thetis source.
        if: runner.os == 'Linux'
        env:
          NEREUS_THETIS_DIR: ${{ github.workspace }}/../Thetis
          NEREUS_MI0BOT_DIR: ${{ github.workspace }}/../mi0bot-Thetis
        run: python3 scripts/generate-contributor-indexes.py --check

      - name: WDSP header census drift detector
        # Re-runs the third_party/wdsp/src/ classification and fails if
        # the counts drift from WDSP-PROVENANCE.md's documented split
        # (128 gpl2-or-later + 10 utility no-header). Catches a WDSP
        # re-sync that forgets to update PROVENANCE.
        if: runner.os == 'Linux'
        run: python3 scripts/audit-wdsp-headers.py

      - name: Set up Python for pytest
        if: runner.os == 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        if: runner.os == 'Linux'
        run: python3 -m pip install --upgrade pip pytest

      - name: pytest — compliance test suite
        # Runs tests/compliance/ (inventory schema + cite baseline).
        if: runner.os == 'Linux'
        run: python3 -m pytest tests/compliance/ -v

      # ------------------------------------------------------------------
      # Linux dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config g++ \
            qt6-base-dev qt6-base-private-dev qt6-multimedia-dev \
            libgl1-mesa-dev libfftw3-dev

      # ------------------------------------------------------------------
      # macOS dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install qt@6 ninja fftw

      # ------------------------------------------------------------------
      # Windows dependencies
      # ------------------------------------------------------------------
      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_mingw
          modules: 'qtmultimedia qtshadertools'
          tools: 'tools_mingw1310'
          cache: true

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Download FFTW3 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p third_party/fftw3/{include,lib,bin}
          curl -L -o /tmp/fftw3.zip "https://fftw.org/pub/fftw/fftw-3.3.5-dll64.zip"
          cd /tmp && unzip -o fftw3.zip -d fftw3
          cp /tmp/fftw3/fftw3.h $GITHUB_WORKSPACE/third_party/fftw3/include/
          cp /tmp/fftw3/libfftw3-3.dll $GITHUB_WORKSPACE/third_party/fftw3/bin/
          cp /tmp/fftw3/libfftw3-3.def $GITHUB_WORKSPACE/third_party/fftw3/lib/

      # ------------------------------------------------------------------
      # Compiler cache (ccache for Linux/macOS, sccache for Windows)
      # ------------------------------------------------------------------
      - name: Install ccache (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ccache

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Restore ccache
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        if: runner.os != 'Windows'
        run: |
          ccache --max-size=2G
          ccache --zero-stats

      # Windows intentionally skips sccache. The GitHub Actions Cache backend
      # (Azure Blob) had a multi-hour outage during Phase 3N shakedown that
      # caused sccache startup to fail hard ("Server startup failed: cache
      # storage failed to read: <h2>Our services aren't available right now</h2>"),
      # and sccache has no graceful fallback. 'sccache --show-stats' is not a
      # reliable probe because it queries a freshly started empty server that
      # hasn't touched the backend yet. Qt install is already cached via
      # install-qt-action's cache: true, which is the dominant cost anyway.

      # ------------------------------------------------------------------
      # Configure
      # ------------------------------------------------------------------
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          # Linux CI uses Ubuntu's system Qt 6 via apt (qt6-base-dev),
          # which on ubuntu-24.04 is Qt 6.4.2 — too old for QRhiWidget
          # (requires 6.7+). GPU spectrum is explicitly disabled here
          # so CMake's new FATAL_ERROR path does not trip. Upgrading
          # the Linux CI runner to install-qt-action-managed Qt 6.7+
          # (matching release.yml) is a separate ticket; for now this
          # matches the historical behavior of Linux CI silently
          # falling back to the CPU path.
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DNEREUS_GPU_SPECTRUM=OFF

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # -DNEREUS_GPU_SPECTRUM=ON is explicit so CMake's FATAL_ERROR
          # fires at configure time if the Qt install is missing the
          # ShaderTools or Gui private modules. v0.1.1 silently shipped
          # without GPU spectrum because this flag was implicit; never
          # again.
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DNEREUS_GPU_SPECTRUM=ON

      # ------------------------------------------------------------------
      # Build
      # ------------------------------------------------------------------
      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cmake --build build -j$NUMBER_OF_PROCESSORS

      # ------------------------------------------------------------------
      # Test
      # ------------------------------------------------------------------
      - name: Test
        working-directory: build
        shell: bash
        run: ctest --output-on-failure --no-tests=ignore

      # ------------------------------------------------------------------
      # PR artifact upload
      # ------------------------------------------------------------------
      - name: Locate built binary
        if: github.event_name == 'pull_request'
        id: locate
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "binary=build/NereusSDR" >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "binary=build/NereusSDR.app" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "binary=build/NereusSDR.exe" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Upload PR build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: NereusSDR-pr${{ github.event.number }}-${{ matrix.name }}
          path: ${{ steps.locate.outputs.binary }}
          retention-days: 7
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # Cache stats
      # ------------------------------------------------------------------
      - name: ccache stats
        if: runner.os != 'Windows'
        run: ccache --show-stats
